<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 3fr .75fr 4fr 2fr;
            justify-self: center;
            width: 600px;
            border: solid 15px #0d2e7d;
            border-radius: 5%;
            position: relative;
        }

        #hero {
            background-image: url(images/jesus_feeds_5000.jpeg);
            background-repeat: no-repeat;
            background-size: cover;
            height: 275px;
            grid-row: 1/2;
            align-content: end;
            justify-items: center;
            color: white;
            text-shadow: 1px 2px 1px black;
            font-size: 1.75em;
        }

        #hero h2 {
            margin-bottom: 1em;
        }

        h3 {
            grid-row: 2/3;
            background-color: white;
            align-content: center;
            text-align: center;
            font-size: 1.75em;
        }

        #myForm {
            grid-row: 3/4;
            background-color: white;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2em;
            padding: 2em;
        }

        #myForm label {
            grid-column: 1/2;
        }

        #myForm input {
            grid-column: 2/3;
        }

        #newsletter, #conditions {
            grid-column: 1/3;
        }

        #scriptures {
            grid-row: 4/5;
            background-color: white;
            display: flex;
            justify-content: space-around;
            
        }

        #scriptures img {
            width: 100px;
        }

    </style>

</head>

<body>
    <div id="formContainer">

        <section id="hero">
            <button type="button" id="closeBtn">X</button>
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </section>

        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">

            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
          
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>

        <section id="scriptures">
            <img src="images/old_testament.webp" alt="Old Testament Cover">
            <img src="images/new_testament.webp" alt="New Testament Cover">
            <img src="images/book_of_mormon.webp" alt="Book of Mormon Cover">
            <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants Cover">
            <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price Cover">
        </section>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
